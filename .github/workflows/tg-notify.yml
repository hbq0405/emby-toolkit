name: Telegram Release Notification & Pin

on:
  release:
    types: [published]

jobs:
  notify_and_pin:
    runs-on: ubuntu-latest
    steps:
      - name: Send and Pin Telegram Message
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_TO: ${{ secrets.TELEGRAM_TO }}
          # 这里拼接你要发送的消息内容
          MESSAGE_TEXT: |
            ➜ **新版本发布啦！**
            
            📦 **项目**: ${{ github.repository }}
            🏷 **版本**: ${{ github.event.release.tag_name }}
            👤 **发布者**: ${{ github.event.release.author.login }}
            ➜ **直达链接**: [点击查看 Release](${{ github.event.release.html_url }})
            📖 **项目文档**: [点击查看 Wiki](https://hbq0405.github.io/emby-toolkit/zh/)
            
            ➜ **更新日志**:
            ${{ github.event.release.body }}
            
        run: |
          # 1. 调用 TG API 发送消息，并将返回结果存入 RESPONSE 变量
          # 使用 jq 安全地处理多行文本和特殊字符
          RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{
              \"chat_id\": \"${TELEGRAM_TO}\",
              \"text\": $(jq -Rs . <<< "$MESSAGE_TEXT"),
              \"parse_mode\": \"Markdown\",
              \"disable_web_page_preview\": true
            }")

          # 2. 从返回的 JSON 结果中提取 message_id
          MESSAGE_ID=$(echo "$RESPONSE" | jq -r '.result.message_id')

          # 3. 判断是否成功获取到 ID，如果成功则执行置顶操作
          if [ "$MESSAGE_ID" != "null" ] && [ -n "$MESSAGE_ID" ]; then
            echo "➜ 消息发送成功，Message ID: $MESSAGE_ID，准备置顶..."
            
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/pinChatMessage" \
              -H "Content-Type: application/json" \
              -d "{
                \"chat_id\": \"${TELEGRAM_TO}\",
                \"message_id\": $MESSAGE_ID,
                \"disable_notification\": false
              }"
              
            echo "📌 置顶完成！"
          else
            echo "➜ 发送失败或无法获取 Message ID: $RESPONSE"
            exit 1
          fi